<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Felipe E. Vilhalva — Ciencia de Redes & IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root {
    --serif: 'Instrument Serif', 'Newsreader', Georgia, serif;
    --mono:  'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

    /* Light theme defaults (overridden by data-theme=dark) */
    --bg:        #f4f1ea;
    --bg-soft:   #ebe6db;
    --ink:       #1a1814;
    --ink-soft:  rgba(26, 24, 20, 0.62);
    --ink-mute:  rgba(26, 24, 20, 0.38);
    --rule:      rgba(26, 24, 20, 0.12);
    --panel-bg:  rgba(244, 241, 234, 0.92);
    --grid:      rgba(26, 24, 20, 0.05);
  }
  :root[data-theme="dark"] {
    --bg:        #0e0d0b;
    --bg-soft:   #14130f;
    --ink:       #f1ece1;
    --ink-soft:  rgba(241, 236, 225, 0.62);
    --ink-mute:  rgba(241, 236, 225, 0.38);
    --rule:      rgba(241, 236, 225, 0.12);
    --panel-bg:  rgba(14, 13, 11, 0.92);
    --grid:      rgba(241, 236, 225, 0.05);
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
    overflow: hidden;
  }

  /* Subtle background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 56px 56px;
    background-position: -1px -1px;
    z-index: 0;
    opacity: 0.7;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* ── Top bar ─────────────────────────────────────────────── */
  .topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 32px;
    z-index: 5;
    pointer-events: none;
  }
  .topbar > * { pointer-events: auto; }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    letter-spacing: 0.02em;
  }
  .brand-mark {
    width: 10px; height: 10px;
    border-radius: 2px;
    transform: rotate(45deg);
    display: inline-block;
  }
  .brand-name { font-weight: 600; }
  .brand-sep { color: var(--ink-mute); }
  .brand-title { color: var(--ink-soft); }

  .topnav { display: flex; gap: 22px; font-size: 12px; }
  .nav-item {
    cursor: pointer;
    color: var(--ink-soft);
    transition: color 0.15s ease;
    position: relative;
  }
  .nav-item:hover { color: var(--ink); }
  .nav-item::before {
    content: '·';
    margin-right: 6px;
    color: var(--ink-mute);
  }

  /* ── Hero text overlay ───────────────────────────────────── */
  .hero {
    position: absolute;
    left: 40px;
    top: 50%;
    transform: translateY(-58%);
    max-width: 420px;
    z-index: 3;
    pointer-events: none;
    animation: heroIn 1.1s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(-58%) translateX(-10px); }
    to   { opacity: 1; transform: translateY(-58%) translateX(0); }
  }
  .hero-eyebrow {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }
  .hero-eyebrow .dot {
    width: 6px; height: 6px; border-radius: 50%;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.3); }
  }
  .hero-h {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(40px, 4.4vw, 64px);
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 0 0 22px;
    color: var(--ink);
  }
  .hero-h em {
    font-style: italic;
    color: var(--ink-soft);
  }
  .hero-sub {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 360px;
    margin: 0;
  }
  .hero-cta {
    display: block;
    margin-top: 6px;
    color: var(--ink);
    font-variant: small-caps;
    letter-spacing: 0.02em;
  }

  /* ── Canvas / graph host ─────────────────────────────────── */
  .canvas {
    position: absolute;
    inset: 0;
    z-index: 2;
  }
  .graph-wrap {
    width: 100%;
    height: 100%;
    position: relative;
    touch-action: none;
  }
  .graph-svg {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
  }
  .graph-svg:active { cursor: grabbing; }

  .nodes .node circle { transition: stroke 0.2s ease, fill 0.2s ease; }
  .nodes .node:hover circle { cursor: pointer; }
  .nodes .node-label {
    font-family: var(--mono);
    font-weight: 500;
    pointer-events: none;
    transition: fill-opacity 0.2s ease;
    letter-spacing: -0.01em;
  }
  .app[data-label-mode="hover"] .nodes .node-label { fill-opacity: 0; }
  .app[data-label-mode="hover"] .nodes .node.hov .node-label,
  .app[data-label-mode="hover"] .nodes .node.sel .node-label { fill-opacity: 0.95; }

  /* ── Legend ──────────────────────────────────────────────── */
  .legend {
    position: absolute;
    left: 32px;
    bottom: 28px;
    z-index: 4;
    font-size: 10.5px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .legend-title {
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 9.5px;
    color: var(--ink-mute);
    margin-bottom: 8px;
  }
  .legend-rows {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .legend-glyph {
    display: inline-block;
    width: 12px;
    text-align: center;
    font-family: var(--mono);
    color: var(--ink);
  }
  .legend-lbl { color: var(--ink-soft); }

  /* ── Meta corner ─────────────────────────────────────────── */
  .meta-corner {
    position: absolute;
    right: 32px;
    bottom: 28px;
    z-index: 4;
    font-size: 10px;
    color: var(--ink-mute);
    text-align: right;
    line-height: 1.6;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  /* ── Side panel ──────────────────────────────────────────── */
  .panel {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(520px, 46vw);
    background: var(--panel-bg);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    backdrop-filter: blur(20px) saturate(140%);
    border-left: 0.5px solid var(--rule);
    z-index: 6;
    overflow-y: auto;
    animation: panelIn 0.45s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes panelIn {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  .panel::-webkit-scrollbar { width: 8px; }
  .panel::-webkit-scrollbar-thumb {
    background: var(--rule);
    border-radius: 4px;
  }

  .panel-inner {
    padding: 64px 56px 64px;
    max-width: 520px;
  }

  .panel-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  .kind-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    padding: 4px 10px;
    border: 0.5px solid;
    border-radius: 999px;
  }
  .panel-close {
    appearance: none;
    background: transparent;
    border: 0;
    color: var(--ink-soft);
    font-family: var(--mono);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.15s ease;
  }
  .panel-close .x {
    font-size: 18px;
    line-height: 1;
    display: inline-block;
    transform: translateY(-1px);
  }
  .panel-close:hover { color: var(--ink); }

  .panel-title {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(32px, 3.2vw, 46px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin: 0 0 14px;
    color: var(--ink);
    text-wrap: pretty;
  }
  .panel-lede {
    font-family: var(--serif);
    font-style: italic;
    font-size: 19px;
    line-height: 1.35;
    color: var(--ink-soft);
    margin: 0 0 32px;
    text-wrap: pretty;
  }
  .panel-body {
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink);
    margin-bottom: 36px;
  }
  .panel-body p { margin: 0 0 14px; }
  .panel-body p:last-child { margin-bottom: 0; }

  .panel-meta {
    margin: 0;
    padding: 20px 0 0;
    border-top: 0.5px solid var(--rule);
  }
  .meta-row {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 16px;
    padding: 8px 0;
    font-size: 11.5px;
    border-bottom: 0.5px dotted var(--rule);
  }
  .meta-row:last-child { border-bottom: 0; }
  .meta-row dt {
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 9.5px;
    padding-top: 2px;
  }
  .meta-row dd {
    margin: 0;
    color: var(--ink);
    word-break: break-word;
  }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 820px) {
    .hero { left: 20px; right: 20px; max-width: none; }
    .topbar { padding: 16px 20px; }
    .brand-title, .brand-sep { display: none; }
    .panel { width: 100%; }
    .panel-inner { padding: 56px 28px; }
    .legend { left: 20px; bottom: 20px; }
    .meta-corner { right: 20px; bottom: 20px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="graph.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
